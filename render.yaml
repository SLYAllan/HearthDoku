services:
  - type: web
    name: hearthdoku-server
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm ci --production
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGIN
        value: https://slyallan.github.io
